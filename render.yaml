services:
  - type: web
    name: gwanak-bnb-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run render:start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
