services:
  - type: web
    name: gwanak-bnb-api
    env: node
    region: singapore
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 4000
      - key: MONGO_URI
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
